name: Sync GameChanger Stats

on:
  # 9:30 PM ET daily (1:30 AM UTC — covers EDT Apr–Nov)
  schedule:
    - cron: "30 1 * * *"
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      debug:
        description: "Save debug screenshot (1 = yes)"
        required: false
        default: "0"

jobs:
  sync:
    name: Scrape & sync batting stats
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright + Chromium
        run: npx playwright install chromium --with-deps

      - name: Run stats sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GC_ORG_ID: ${{ secrets.GC_ORG_ID }}
          GC_DEBUG: ${{ github.event.inputs.debug || '0' }}
        run: node scripts/sync-gc-stats.mjs

      # Upload debug files if they were created (only when extraction fails
      # or when GC_DEBUG=1 was passed)
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gc-stats-debug
          path: |
            gc-stats-debug.png
            gc-stats-page-text.txt
          if-no-files-found: ignore
          retention-days: 7
