name: Sync GameChanger Stats

on:
  # 9:30 PM ET daily (1:30 AM UTC — covers EDT Apr–Nov)
  schedule:
    - cron: "30 1 * * *"
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  sync:
    name: Scrape & sync batting stats
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright + Chromium
        run: npx playwright install chromium --with-deps

      - name: Run stats sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GC_ORG_ID: ${{ secrets.GC_ORG_ID }}
        run: node scripts/sync-gc-stats.mjs
